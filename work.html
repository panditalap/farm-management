<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Work — MyProject</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
  />
</head>
<body>

  <!-- Navbar goes here — injected by components.js -->
  <div id="navbar-placeholder"></div>

  <!-- PAGE CONTENT — this is the only part unique to each page -->
  <main class="container mt-4">

    <h1>Work</h1>
    <p class="lead">This is the work page.</p>

    <table class="table table-bordered mt-4">
      <thead class="table-dark">
        <tr>
          <th>Project</th>
          <th>Status</th>
          <th>Year</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Project Alpha</td>
          <td><span class="badge bg-success">Complete</span></td>
          <td>2024</td>
        </tr>
        <tr>
          <td>Project Beta</td>
          <td><span class="badge bg-warning text-dark">In Progress</span></td>
          <td>2025</td>
        </tr>
        <tr>
          <td>Project Gamma</td>
          <td><span class="badge bg-secondary">Planned</span></td>
          <td>2025</td>
        </tr>
      </tbody>
    </table>

  </main>

  <!-- Footer goes here — injected by components.js -->
  <div id="footer-placeholder"></div>

  <!-- Scripts: Bootstrap first, then our component loader -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/components.js"></script>

</body>
</html>
